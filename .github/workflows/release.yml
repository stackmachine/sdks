name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_existing_version:
        description: Publish the package.json version already on main
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Create release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out repository
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm ci

      - name: Check formatting
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run format:check

      - name: Type check
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run typecheck

      - name: Build package
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run build

      - name: Check schema
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run check-schema

      - name: Verify package contents
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm publish

  publish-existing:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_existing_version }}
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Check schema
        run: npm run check-schema

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish
