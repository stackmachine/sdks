name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run ci

  validate-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --dev --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run --frozen ruff check src examples tests

      - name: Test
        run: uv run --frozen pytest

      - name: Build package
        run: uv build --no-sources
